<style>
  :root{
    --bg1:#fff4e2;--bg2:#ffe2c4;--bg3:#ffd2ad;--card:#fffaf2;--card2:#fff6ea;
    --ink:#5b4631;--muted:#a78d70;--faint:#cbb89c;
    --tileA:#ffd684;--tileB:#f7b94e;--tileInk:#6b4d1f;--tileSh:#d99a36;
    --green:#7cc167;--greenInk:#fff;--accent:#f0824a;--accent2:#e3652b;--teal:#46b3a6;
    --box:#f2e5d1;--boxLine:#e6d5ba;--shadow:0 6px 18px rgba(120,80,40,.13);--heart:#e8607a;--coin:#f3b53a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0}
  body{background:linear-gradient(165deg,var(--bg1),var(--bg2) 55%,var(--bg3));background-attachment:fixed;color:var(--ink);
    font-family:"Nunito",system-ui,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;padding:14px 13px 26px;transition:background .6s}
  .wrap{max-width:460px;margin:0 auto}
  .baloo{font-family:"Baloo 2",cursive}
  .hide{display:none!important}
  .hud{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:12px;font-family:"Baloo 2",cursive;font-weight:700;font-size:15px}
  .hud .chip{background:var(--card);border-radius:12px;padding:5px 11px;box-shadow:var(--shadow);display:flex;align-items:center;gap:5px}
  .hud .hearts{color:var(--heart)} .hud .coins{color:var(--coin)} .hud .streak{color:var(--accent2)}
  .iconbtn{background:var(--card);border:none;border-radius:12px;padding:6px 10px;box-shadow:var(--shadow);font-size:16px;cursor:pointer}

  /* HOME */
  #home{text-align:center;padding-top:14px}
  .logo{font-family:"Baloo 2",cursive;font-size:46px;font-weight:800;color:var(--accent2);line-height:1;text-shadow:0 3px 0 #fff,0 4px 8px rgba(227,101,43,.25)}
  .logo .k{display:inline-block;animation:bob 2.4s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .tag{font-weight:800;color:var(--muted);margin:6px 0 26px;font-size:14px}
  .playbtn{font-family:"Baloo 2",cursive;font-weight:700;font-size:21px;color:#fff;border:none;border-radius:18px;padding:17px;width:100%;cursor:pointer;margin-bottom:12px;
    box-shadow:0 6px 0 var(--accent2);transition:transform .07s;background:linear-gradient(180deg,var(--accent),var(--accent2))}
  .playbtn.alt{background:linear-gradient(180deg,#56c4b6,#3a9e92);box-shadow:0 6px 0 #2f8378}
  .playbtn:active{transform:translateY(4px);box-shadow:0 2px 0 var(--accent2)}
  .playbtn.alt:active{box-shadow:0 2px 0 #2f8378}
  .playbtn small{display:block;font-family:"Nunito";font-weight:700;font-size:12px;opacity:.9;margin-top:2px}
  .homestats{display:flex;justify-content:center;gap:18px;margin-top:8px;font-family:"Baloo 2",cursive;font-weight:700;color:var(--muted);font-size:14px}

  /* GAME */
  .topline{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .timerbox{font-family:"Baloo 2",cursive;font-weight:700;font-size:20px;background:var(--card);padding:5px 14px;border-radius:13px;box-shadow:var(--shadow);min-width:78px;text-align:center}
  .timerbox.low{color:#fff;background:linear-gradient(180deg,var(--accent),var(--accent2));animation:pulse .8s infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
  .tbarwrap{flex:1;height:10px;background:#f0e0c8;border-radius:7px;overflow:hidden;box-shadow:inset 0 1px 2px rgba(120,80,40,.15)}
  .tbar{height:100%;width:100%;background:linear-gradient(90deg,var(--teal),#74c9bd);transition:width 1s linear,background .4s}
  .tbar.low{background:linear-gradient(90deg,var(--accent2),var(--accent))}
  .cluecard{background:var(--card);border-radius:18px;padding:16px;text-align:center;box-shadow:var(--shadow);margin-bottom:14px}
  .cluecard .lbl{font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);margin-bottom:6px}
  .cluecard .cat{display:inline-block;font-size:11px;font-weight:800;color:var(--teal);background:#e4f4f1;border-radius:20px;padding:2px 10px;margin-bottom:8px}
  .cluecard .clue{font-family:"Baloo 2",cursive;font-size:20px;font-weight:600;color:var(--ink);line-height:1.25}
  .slots{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
  .slot{width:40px;height:48px;border-radius:11px;background:var(--box);border:2px dashed var(--boxLine);display:flex;align-items:center;justify-content:center;
    font-family:"Baloo 2",cursive;font-size:23px;font-weight:800;text-transform:uppercase;color:var(--ink);cursor:pointer;transition:transform .07s}
  .slot.filled{background:linear-gradient(180deg,#fff,#fff3e0);border-style:solid;border-color:var(--tileB)}
  .slot.locked{background:linear-gradient(180deg,#e8f3e2,#d8eccf);border-color:var(--green);color:#3f7a32}
  .slot.win{background:var(--green);border-color:var(--green);color:#fff;animation:pop .35s}
  .slots.shake{animation:shake .35s}
  @keyframes pop{0%{transform:scale(.6)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}
  .rack{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;min-height:56px}
  .tile{width:48px;height:54px;border-radius:14px;background:linear-gradient(180deg,var(--tileA),var(--tileB));color:var(--tileInk);
    font-family:"Baloo 2",cursive;font-size:25px;font-weight:800;text-transform:uppercase;display:flex;align-items:center;justify-content:center;
    cursor:pointer;box-shadow:0 4px 0 var(--tileSh),inset 0 1px 1px rgba(255,255,255,.5);user-select:none;transition:transform .07s,opacity .12s}
  .tile:active{transform:translateY(3px);box-shadow:0 1px 0 var(--tileSh)}
  .tile.used{opacity:0;pointer-events:none}
  .controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .controls button{font-family:"Nunito",sans-serif;font-weight:800;font-size:13px;padding:12px 4px;border-radius:13px;cursor:pointer;border:none;
    background:var(--card);color:var(--ink);box-shadow:0 3px 0 #e6d3b6;transition:transform .06s}
  .controls button:active:not(:disabled){transform:translateY(2px);box-shadow:0 1px 0 #e6d3b6}
  .controls button.hint{color:var(--accent2)} .controls button .cc{color:var(--coin);font-size:11px}
  .controls button:disabled{opacity:.45}

  /* OVERLAY (result / gameover) */
  .ov{position:fixed;inset:0;background:rgba(60,40,20,.5);display:flex;align-items:center;justify-content:center;padding:20px;z-index:20}
  .ov .panel{background:var(--card);border-radius:22px;padding:24px 20px;width:100%;max-width:360px;text-align:center;box-shadow:0 20px 50px rgba(80,50,20,.35);animation:rise .3s}

  .ov h2{font-family:"Baloo 2",cursive;margin:0 0 4px;font-size:27px;color:var(--accent2)}
  .stars{font-size:38px;letter-spacing:6px;margin:6px 0}

  .ov .rows b{color:var(--ink)}
  .ov button{font-family:"Baloo 2",cursive;font-weight:700;font-size:17px;border:none;border-radius:15px;padding:13px;width:100%;cursor:pointer;margin-top:9px;color:#fff;

  .ov button:active{transform:translateY(3px);box-shadow:0 2px 0 var(--accent2)}
  .ov button.ghost{background:var(--card2);color:var(--ink);box-shadow:0 4px 0 #e6d3b6}
  .ov button.ad{background:linear-gradient(180deg,#56c4b6,#3a9e92);box-shadow:0 5px 0 #2f8378}

  .ov input{width:100%;font-family:"Baloo 2",cursive;font-weight:700;font-size:18px;padding:12px;border-radius:12px;border:2px solid var(--boxLine);text-align:center;outline:none;margin-top:6px}
  .lbtable{margin:6px 0}
  .lbrow{display:flex;gap:10px;align-items:center;font-family:"Baloo 2",cursive;font-weight:700;font-size:15px;padding:8px 10px;border-radius:10px;color:var(--ink)}

  .lbrow .nm{flex:1;text-align:left}
  .lbrow span:first-child{width:22px;color:var(--muted);text-align:center}
  .lbrow.me{background:linear-gradient(180deg,var(--tileA),var(--tileB));color:var(--tileInk)}

  .namebar{margin-top:14px;font-weight:800;color:var(--muted);font-size:13px;cursor:pointer}
  .namebar b{color:var(--accent2)}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#fff;border:1.5px solid var(--boxLine);color:var(--ink);
    font-weight:800;font-size:13px;padding:10px 16px;border-radius:12px;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:30;box-shadow:var(--shadow)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
  .region-banner{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:25;pointer-events:none;opacity:0}
  .region-banner.show{animation:banner 2s ease}
  .region-banner .rb{font-family:"Baloo 2",cursive;font-weight:800;font-size:30px;color:#fff;background:linear-gradient(180deg,var(--accent),var(--accent2));padding:16px 30px;border-radius:20px;box-shadow:0 10px 30px rgba(80,50,20,.4)}
  @keyframes banner{0%{opacity:0;transform:scale(.8)}20%,75%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.05)}}
  .foot{text-align:center;font-size:11px;font-weight:600;color:var(--faint);margin-top:16px}
</style>
</head>

    G={mode:mode,region:region,tid:null};
    show("game");updHUD();
    if(mode==="daily"){G.daily={queue:dailySet(),idx:0,score:0,stars:0,solved:0};loadWord(G.daily.queue[0]);}
    else{G.level=ST.level;if((ST.level-1)%10===0)showRegionBanner(region);loadWord(pickCampaign(ST.level));}
  }
  function loadWord(entry){
    var target=entry.w.split(""),sc=shuf(target);while(sc.join("")===target.join(""))sc=shuf(target);
    G.word=entry.w;G.clue=entry.c;G.cat=entry.k;G.target=target;
    G.slots=target.map(function(){return null;});G.rack=sc.map(function(ch){return {ch:ch,used:false};});
    G.base=baseTime(target.length,entry.d);G.time=G.base;G.hints=0;G.wrong=0;G.solved=false;G.started=false;
    if(G.tid){clearInterval(G.tid);G.tid=null;}
    $("levelLbl").textContent= G.mode==="daily"?("Günlük "+(G.daily.idx+1)+"/5"):("Seviye "+ST.level);
    $("cat").textContent=entry.k;$("clue").textContent=entry.c;
    renderSlots();renderRack();updTimer();startTimer();
  }
  function markDayStreak(){var t=dayNo();if(ST.lastDay!==t){ST.streak=(ST.lastDay===t-1)?ST.streak+1:1;ST.lastDay=t;}}
  function dailyComplete(){
    ST.dailyDay=dayNo();ST.dailyDone=true;markDayStreak();
    if(G.daily.score>ST.best)ST.best=G.daily.score;recordLeaderboard(G.daily.score);saveST();updHUD();
    overlay('<h2>Günlük tamam! 🎉</h2><div class="rows"><b>'+G.daily.solved+'/5</b> kelime · <b>'+G.daily.score+'</b> puan · ⭐'+G.daily.stars+'<br>🔥 '+ST.streak+' günlük seri</div>'+
      '<button id="ovLb">🏆 Liderlik</button><button class="ghost" id="ovShare">Paylaş</button><button class="ghost" id="ovHome">Ana Menü</button>');
    $("ovLb").onclick=function(){closeOverlay();showLeaderboard();};
    $("ovShare").onclick=function(){shareImage("Kelimatiko Günlük — "+G.daily.solved+"/5 · "+G.daily.score+" puan 🔥"+ST.streak,{title:"Günlük Bulmaca",score:G.daily.score,stars:Math.round(G.daily.stars/15*3),sub:G.daily.solved+"/5 kelime · 🔥 "+ST.streak+" gün"});};
    $("ovHome").onclick=function(){closeOverlay();show("home");updHome();applyRegion(0);};
  }
  function showRegionBanner(idx){var b=$("regionBanner");$("regionBannerTxt").textContent="🌅 "+REGIONS[idx%REGIONS.length].name+" Bölgesi";b.classList.remove("show");void b.offsetWidth;b.classList.add("show");}
  function startTimer(){if(G.started)return;G.started=true;G.tid=setInterval(function(){G.time--;updTimer();if(G.time<=0)fail();},1000);}
  function updTimer(){$("timerBox").textContent=mmss(G.time);var p=Math.max(0,G.time/G.base*100);$("tbar").style.width=p+"%";var low=G.time<=10;$("tbar").classList.toggle("low",G.time<=G.base*0.25);$("timerBox").classList.toggle("low",low);}
  function renderSlots(){var el=$("slots");el.innerHTML="";G.slots.forEach(function(s,i){var d=document.createElement("div");d.className="slot"+(s?(s.locked?" locked":" filled"):"");d.textContent=s?upper(s.ch):"";d.dataset.s=i;el.appendChild(d);});}
  function renderRack(){var el=$("rack");el.innerHTML="";G.rack.forEach(function(t,i){var d=document.createElement("div");d.className="tile"+(t.used?" used":"");d.textContent=upper(t.ch);d.dataset.i=i;el.appendChild(d);});}
  function firstEmpty(){for(var i=0;i<G.slots.length;i++)if(!G.slots[i])return i;return -1;}
  function place(ri){if(G.solved||G.rack[ri].used)return;startTimer();var s=firstEmpty();if(s<0)return;G.slots[s]={ch:G.rack[ri].ch,ri:ri,locked:false};G.rack[ri].used=true;sfxPlace();renderSlots();renderRack();if(firstEmpty()<0)check();}
  function clearSlot(si){var s=G.slots[si];if(!s||s.locked||G.solved)return;G.rack[s.ri].used=false;G.slots[si]=null;sfxTap();renderSlots();renderRack();}
  function check(){
    if(firstEmpty()>=0){toast("Tüm kutuları doldur");return;}
    var guess=G.slots.map(function(s){return s.ch;}).join("");
    if(guess===G.target.join("")){win();return;}
    G.wrong++;sfxWrong();var el=$("slots");el.classList.add("shake");setTimeout(function(){el.classList.remove("shake");},350);
    G.time=Math.max(1,G.time-5);updTimer();toast("Bu değil  −5 sn");
    G.slots.forEach(function(s,i){if(s&&!s.locked){G.rack[s.ri].used=false;G.slots[i]=null;}});renderSlots();renderRack();
  }
  function hint(){
    if(G.solved)return;startTimer();
    if(ST.coins<25){toast("Yetersiz coin (🪙25 gerek)");return;}
    var s=firstEmpty();if(s<0){toast("Önce bir kutu boşalt");return;}
    var need=G.target[s],ri=-1;for(var i=0;i<G.rack.length;i++){if(!G.rack[i].used&&G.rack[i].ch===need){ri=i;break;}}
    if(ri<0){toast("O harf zaten yerinde");return;}
    ST.coins-=25;G.hints++;G.slots[s]={ch:need,ri:ri,locked:true};G.rack[ri].used=true;sfxCoin();
    updHUD();saveST();renderSlots();renderRack();toast("Harf açıldı (−🪙25, yıldız düşer)");if(firstEmpty()<0)check();
  }
  function stopTimer(){if(G.tid){clearInterval(G.tid);G.tid=null;}}

  function win(){
    G.solved=true;stopTimer();sfxWin();
    Array.prototype.forEach.call($("slots").children,function(c){c.className="slot win";});
    var ratio=G.time/G.base;
    var stars=(G.hints===0&&G.wrong===0&&ratio>0.5)?3:(G.hints<=1&&ratio>0.25)?2:1;
    var score=Math.round((100+G.target.length*20)*ratio*stars);
    var coinsEarned=10+stars*8+G.target.length*2;
    ST.coins+=coinsEarned;ST.stars+=stars;
    if(G.mode==="daily"){
      G.daily.score+=score;G.daily.stars+=stars;G.daily.solved++;G.daily.idx++;saveST();updHUD();
      if(G.daily.idx<G.daily.queue.length){toast("Doğru! "+G.daily.idx+"/5 ✓");setTimeout(function(){loadWord(G.daily.queue[G.daily.idx]);},850);}
      else dailyComplete();
    } else {
      ST.level++;markDayStreak();if(score>ST.best)ST.best=score;recordLeaderboard(ST.best);saveST();updHUD();
      resultOverlay(true,stars,score,coinsEarned);
    }
  }
  function fail(){
    G.solved=true;stopTimer();sfxWrong();
    if(G.mode==="daily"){
      G.daily.idx++;
      if(G.daily.idx<G.daily.queue.length){toast("Süre doldu — sonraki");setTimeout(function(){loadWord(G.daily.queue[G.daily.idx]);},850);}
      else dailyComplete();
      return;
    }
    ST.hearts--;saveST();updHUD();
    if(ST.hearts<=0){gameOverOverlay();return;}
    resultOverlay(false,0,0,0);
  }

  function starHTML(n){var h='';for(var i=0;i<3;i++)h+='<span class="s'+(i<n?' on':'')+'">★</span>';return h;}
  function overlay(html){$("overlayRoot").innerHTML='<div class="ov"><div class="panel">'+html+'</div></div>';}
  function closeOverlay(){$("overlayRoot").innerHTML="";}
  function shareTxt(stars,score){return "Kelimatiko — "+upper(G.word)+" ✓ "+["","⭐","⭐⭐","⭐⭐⭐"][stars]+" · "+score+" puan 🔥"+ST.streak;}

  function resultOverlay(won,stars,score,coinsEarned){
    if(won){
      overlay('<h2>Çözdün! 🎉</h2><div class="stars">'+starHTML(stars)+'</div><div class="ans">'+upper(G.word)+'</div>'+
        '<div class="rows"><b>+'+score+'</b> puan · <b>+'+coinsEarned+'</b> 🪙'+(G.hints?(' · '+G.hints+' ipucu'):'')+'<br>kalan süre '+mmss(G.time)+'</div>'+
        (G.mode==="campaign"?'<button id="ovNext">Sonraki Seviye →</button>':'<button id="ovNext">Tamam</button>')+
        '<button class="ghost" id="ovShare">Paylaş</button>');
      setTimeout(function(){for(var i=0;i<stars;i++)setTimeout(sfxStar,i*150);},200);
      $("ovNext").onclick=function(){closeOverlay();if(G.mode==="campaign")startGame("campaign");else{show("home");updHome();}};
      $("ovShare").onclick=function(){shareImage(shareTxt(stars,score),{title:"Macera · Seviye "+(ST.level-1),score:score,stars:stars,sub:upper(G.word)+" · 🔥 "+ST.streak+" gün"});};
    }else{
      overlay('<h2>Süre doldu ⏰</h2><div class="ans">'+upper(G.word)+'</div><div class="rows">Doğru kelime buydu.'+(G.mode==="campaign"?'<br>❤️ kalan can: '+ST.hearts:'')+'</div>'+
        (G.mode==="campaign"?'<button id="ovRetry">Devam Et →</button>':'<button id="ovRetry">Tamam</button>')+
        '<button class="ghost" id="ovHome">Ana Menü</button>');
      $("ovRetry").onclick=function(){closeOverlay();if(G.mode==="campaign")startGame("campaign");else{show("home");updHome();}};
      $("ovHome").onclick=function(){closeOverlay();show("home");updHome();};
    }
  }
  function gameOverOverlay(){
    overlay('<h2>Canların bitti 💔</h2><div class="rows">Seviye <b>'+ST.level+'</b>\'e kadar geldin.<br>Reklam izleyip 5 can kazan ve devam et.</div>'+
      '<button class="ad" id="ovAd">📺 Reklam izle → ❤️5</button><button class="ghost" id="ovHome">Ana Menü</button>');
    $("ovAd").onclick=function(){ // PROTOTİP: reklam yerine anında ver
      toast("(prototip) reklam izlendi"); ST.hearts=5;saveST();updHUD();closeOverlay();startGame("campaign");};
    $("ovHome").onclick=function(){ST.hearts=Math.max(1,ST.hearts);closeOverlay();show("home");updHome();};
  }
  function doShare(txt){if(navigator.share)navigator.share({text:txt}).catch(function(){});else if(navigator.clipboard)navigator.clipboard.writeText(txt).then(function(){toast("Kopyalandı");});else toast(txt);}

  // ===== toast =====
  function toast(m){var t=$("toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove("show");},1300);}

  // ===== events =====
  $("dailyBtn").onclick=function(){ if(ST.dailyDay===dayNo()&&ST.dailyDone){toast("Bugünün kelimesini çözdün — yarın gel!");return;} startGame("daily"); };
  $("campaignBtn").onclick=function(){ if(ST.hearts<=0)ST.hearts=5; startGame("campaign"); };
  $("homeBtn").onclick=function(){ if(G)stopTimer(); closeOverlay(); show("home");updHome();applyRegion(0); };
  $("soundBtn").onclick=function(){ ST.sound=!ST.sound;saveST();$("soundBtn").textContent=ST.sound?"🔊":"🔇";if(ST.sound){ac();sfxPlace();} };
  $("slots").addEventListener("click",function(e){var d=e.target.closest(".slot");if(d)clearSlot(+d.dataset.s);});
  $("rack").addEventListener("click",function(e){var d=e.target.closest(".tile");if(d){ac();place(+d.dataset.i);}});
  $("shuffleBtn").onclick=function(){if(!G||G.solved)return;var un=G.rack.filter(function(t){return !t.used;});var sh=shuf(un),k=0;G.rack.forEach(function(t){if(!t.used)t.ch=sh[k++].ch;});sfxTap();renderRack();};
  $("hintBtn").onclick=hint;
  $("checkBtn").onclick=function(){if(G&&!G.solved)check();};
  document.addEventListener("keydown",function(e){
    if(!G||G.solved||$("game").classList.contains("hide"))return;
    if(e.key==="Enter")check();
    else if(e.key==="Backspace"){for(var i=G.slots.length-1;i>=0;i--){if(G.slots[i]&&!G.slots[i].locked){clearSlot(i);break;}}}
    else{var ch=e.key.toLocaleLowerCase("tr");for(var k=0;k<G.rack.length;k++){if(!G.rack[k].used&&G.rack[k].ch===ch){place(k);break;}}}
  });

  // ===== leaderboard & name =====
  function escapeHtml(s){return (s+"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
  function recordLeaderboard(score){if(!ST.lb)ST.lb=LB_SEED.slice();var nm=ST.name||"Oyuncu",f=null;for(var i=0;i<ST.lb.length;i++)if(ST.lb[i].me)f=ST.lb[i];if(f){f.name=nm;if(score>f.score)f.score=score;}else ST.lb.push({name:nm,score:score,me:true});ST.lb.sort(function(a,b){return b.score-a.score;});saveST();sbSubmit(nm,score);}
  function renderLbRows(list,meName){return list.slice(0,15).map(function(e,i){var me=e.me||(meName&&e.name===meName);return '<div class="lbrow'+(me?' me':'')+'"><span>'+(i+1)+'</span><span class="nm">'+(me?'⭐ ':'')+escapeHtml(e.name)+'</span><span>'+e.score+'</span></div>';}).join("");}
  function showLeaderboard(){
    if(SB_ON){
      overlay('<h2>🏆 Liderlik</h2><div class="lbtable" id="lbBody"><div class="rows">Yükleniyor…</div></div><div class="rows" style="font-size:11px">🌍 Global liderlik</div><button id="ovHome">Kapat</button>');
      $("ovHome").onclick=closeOverlay;
      sbTop(function(data){var b=$("lbBody");if(!b)return;
        if(!data){b.innerHTML=renderLbRows(ST.lb||[],null)+'<div class="rows" style="font-size:11px">(bağlantı yok — yerel)</div>';return;}
        if(!data.length){b.innerHTML='<div class="rows">Henüz skor yok — ilk sen ol! 🚀</div>';return;}
        b.innerHTML=renderLbRows(data,ST.name||"");});
    }else{
      overlay('<h2>🏆 Liderlik</h2><div class="lbtable">'+renderLbRows(ST.lb||[],null)+'</div><div class="rows" style="font-size:11px">Şimdilik cihazına özel · yayında global olacak</div><button id="ovHome">Kapat</button>');
      $("ovHome").onclick=closeOverlay;
    }
  }
  function askName(cb){overlay('<h2>Adın ne?</h2><div class="rows">Liderlik tablosunda görünecek.</div><input id="nameInput" maxlength="12" placeholder="Adın"/><button id="nameOk">Tamam</button>');var inp=$("nameInput");inp.value=ST.name||"";setTimeout(function(){try{inp.focus();}catch(e){}},120);$("nameOk").onclick=function(){var v=(inp.value||"").trim().slice(0,12)||"Oyuncu";ST.name=v;saveST();renderNameBar();updHome();closeOverlay();if(cb)cb();};}
  function renderNameBar(){$("nameBar").innerHTML="👤 <b>"+escapeHtml(ST.name||"Oyuncu")+"</b> · adı değiştir";}
  $("lbBtn").onclick=function(){showLeaderboard();};
  $("nameBar").onclick=function(){askName();};
  $("helpBtn").onclick=function(){howToPlay();};
  function howToPlay(){
    overlay('<h2>Nasıl Oynanır?</h2><div class="rows" style="text-align:left;line-height:1.9">1\u20e3 Üstteki <b>ipucunu</b> oku.<br>2\u20e3 Karışık <b>harflere dokun</b>, kelimeyi kur.<br>3\u20e3 <b>Süre dolmadan</b> doğru kelimeyi bul!<br>💡 Takılırsan coin ile harf açabilirsin.<br>🔥 Her gün oyna, serini büyüt.</div><button id="ovOk">Anladım</button>');
    $("ovOk").onclick=function(){ST.seenTut=true;saveST();closeOverlay();};
  }
  function roundRect(x,a,b,w,h,r){x.beginPath();x.moveTo(a+r,b);x.arcTo(a+w,b,a+w,b+h,r);x.arcTo(a+w,b+h,a,b+h,r);x.arcTo(a,b+h,a,b,r);x.arcTo(a,b,a+w,b,r);x.closePath();}
  function drawShareCard(x,o){
    var W=1080,H=1080,g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,"#fff4e2");g.addColorStop(1,"#ffd2ad");x.fillStyle=g;x.fillRect(0,0,W,H);
    x.fillStyle="#fffaf2";roundRect(x,90,160,900,760,44);x.fill();
    x.textAlign="center";
    x.fillStyle="#e3652b";x.font="800 88px 'Baloo 2',sans-serif";x.fillText("Kelimatiko",540,320);
    x.fillStyle="#a78d70";x.font="700 40px Nunito,sans-serif";x.fillText(o.title||"",540,392);
    x.fillStyle="#f7b94e";x.font="800 156px 'Baloo 2',sans-serif";x.fillText(String(o.score||0),540,575);
    x.fillStyle="#5b4631";x.font="700 46px Nunito,sans-serif";x.fillText("puan",540,632);
    var st="";for(var i=0;i<3;i++)st+=(i<(o.stars||0)?"★":"☆");x.fillStyle="#f7b94e";x.font="96px Nunito,sans-serif";x.fillText(st,540,760);
    x.fillStyle="#5b4631";x.font="700 48px Nunito,sans-serif";x.fillText(o.sub||"",540,852);
    x.fillStyle="#c9a86e";x.font="700 38px Nunito,sans-serif";x.fillText("oyna · kelimatiko",540,902);
  }
  function shareImage(txt,opts){
    var done=function(){
      try{
        var c=document.createElement("canvas");c.width=1080;c.height=1080;var x=c.getContext("2d");drawShareCard(x,opts);
        c.toBlob(function(blob){
          if(!blob){doShare(txt);return;}
          try{var file=new File([blob],"kelimatiko.png",{type:"image/png"});
            if(navigator.canShare&&navigator.canShare({files:[file]})){navigator.share({files:[file],text:txt}).catch(function(){});return;}
          }catch(e){}
          var url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download="kelimatiko.png";document.body.appendChild(a);a.click();a.remove();setTimeout(function(){URL.revokeObjectURL(url);},3000);
          if(navigator.clipboard)navigator.clipboard.writeText(txt).catch(function(){});toast("Kart indirildi 📸");
        },"image/png");
      }catch(e){doShare(txt);}
    };
    if(document.fonts&&document.fonts.ready)document.fonts.ready.then(done,done);else done();
  }

  // ===== boot =====
  loadST();updHUD();updHome();renderNameBar();$("soundBtn").textContent=ST.sound?"🔊":"🔇";applyRegion(0);show("home");
  if(!ST.name)setTimeout(function(){askName(function(){if(!ST.seenTut)howToPlay();});},300);
  else if(!ST.seenTut)setTimeout(howToPlay,400);
})();
</script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}</script>
</body>
